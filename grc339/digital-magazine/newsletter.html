<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://use.typekit.net/rgv1jfk.css">
      <title>Field Notes</title>
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
   </head>
   
   <body>
      <div class="container">
         <header>
            <h1><a href="index.html"><img src="logo.svg" alt="Field Work Logo"></a></h1>
            <nav>
               <ul>
                  <li><a href="#">California</a></li>
                  <li><a href="#">North America</a></li>
                  <li><a href="#">Asia</a></li>
                  <li><a href="#">Europe</a></li>
                  <li><a href="photogallery.html">Gallery</a></li>
                  <li><a href="newsletter.html">Join Us</a></li>
               </ul>
            </nav>
         </header>
         
        <main class="form">
            <section class="hero">
               <img src="PointLobos.JPG" alt="Point Lobos ocean scenery with a father and child.">
               <section class="herotext">
                  <h2>Join Us</h2>
                  <p>Get Field Work delivered straight to your email, and see only the content you want.</p>
               </section>
            </section>
            <form>
                <section class="personal-info">
                    <h3>Personal information</h3>
                    <ul>
                        <li><label for="name">Name:</label> <input type="text" name="name" id="name" placeholder="your full name" /></li>
                        <li><label for="email">Email:</label> <input type="email" name="email" id="email" placeholder="confirmation email" /></li>
                    </ul>
                </section>

                <section class="interests">
                    <h3>Interests</h3>
                    <p>What would you like to hear about?</p>
                    <ul>
                        <li><input type="checkbox" id="tripinspiration" value="tripinspiration" /> <label for="tripinspiration">Trip Inspiration</label></li>
                        <li><input type="checkbox" id="backpackingtrips" value="backpackingtrips" /> <label for="backpackingtrips">Backpacking Trips</label></li>
                        <li><input type="checkbox" id="bikepackingtrips" value="bikepackingtrips" /> <label for="bikepackingtrips">Bikepacking Trips</label></li>
                        <li><input type="checkbox" id="photographyhighlights" value="photographyhighlights" /> <label for="photographyhighlights">Photography Highlights</label></li>
                    </ul>
                </section>

                <button class="submit">Join Us</button>
            </form>
        </main>

         <footer>All rights reserved.</footer>

      </div>
   </body>

</html>
